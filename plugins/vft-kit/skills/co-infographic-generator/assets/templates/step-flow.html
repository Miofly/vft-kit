<!DOCTYPE html>
<!-- 模板：横向 N 步流程，只展示步骤标题。改法：复制「.step + .arrow」对；最后一步后不要 .arrow。 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root{ --accent:#0ea5a4; --accent2:#06b6d4; --ink:#0f2433; --sub:#5b7180; --line:#dde8ed; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;}
  #shot{
    width:980px;padding:36px 30px 40px;background-color:#f7fafb;
    background-image:
      radial-gradient(1100px 320px at 50% -150px,rgba(14,165,164,.10),transparent 70%),
      linear-gradient(rgba(15,36,51,.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(15,36,51,.035) 1px,transparent 1px);
    background-size:auto,28px 28px,28px 28px;
  }
  .title{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:34px;}
  .title .bar{width:5px;height:24px;border-radius:4px;background:linear-gradient(180deg,var(--accent),var(--accent2));}
  .title h1{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:.5px;}
  .flow{display:flex;align-items:stretch;justify-content:center;}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .num{width:54px;height:54px;border-radius:16px;margin-bottom:16px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:20px;font-weight:800;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(6,182,212,.32);}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 14px;width:182px;min-height:96px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 6px 16px rgba(15,36,51,.06);position:relative;}
  .card .top{height:3px;position:absolute;left:0;top:0;right:0;border-radius:14px 14px 0 0;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .ico{width:26px;height:26px;color:var(--accent);} .ico svg{width:26px;height:26px;display:block;}
  .h{font-size:14.5px;font-weight:700;color:var(--ink);line-height:1.4;}
  .arrow{display:flex;align-items:center;color:var(--accent);font-size:22px;font-weight:700;
    margin-top:88px;width:34px;justify-content:center;flex:0 0 34px;}
</style>
</head>
<body>
  <div id="shot">
    <div class="title"><span class="bar"></span><h1>流程标题</h1></div>
    <div class="flow">

      <div class="step">
        <div class="num">01</div>
        <div class="card"><span class="top"></span>
          <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
          <span class="h">步骤标题一</span>
        </div>
      </div>
      <div class="arrow">&rarr;</div>

      <div class="step">
        <div class="num">02</div>
        <div class="card"><span class="top"></span>
          <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/></svg></span>
          <span class="h">步骤标题二</span>
        </div>
      </div>
      <div class="arrow">&rarr;</div>

      <div class="step">
        <div class="num">03</div>
        <div class="card"><span class="top"></span>
          <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>
          <span class="h">步骤标题三</span>
        </div>
      </div>
      <div class="arrow">&rarr;</div>

      <div class="step">
        <div class="num">04</div>
        <div class="card"><span class="top"></span>
          <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
          <span class="h">步骤标题四</span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
